{% extends "base.html" %}

{% set body_class = 'page-chat' %}

{% block head %}
<script type="module">
    import '/static/js/app.js'
</script>
{% endblock head %}

{% block content %}


<main class="base-container chat-container">
    <div id="responses"></div>

    <button id="scroll-to-bottom" type="button" title="Scroll to bottom" aria-label="Scroll to bottom">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m480-320 160-160-56-56-64 64v-168h-80v168l-64-64-56 56 160 160Zm0 240q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>
    </button>
    <div id="prompt">
        <form id="message-form">
            <textarea id="message" placeholder="Ask me anything"></textarea>
            <input id="image-input" type="file" accept="image/*" multiple class="hidden">
            <input id="attachment-input" type="file" accept=".txt,.md,.markdown,.csv,.json,.py,.yaml,.yml,.log,.xml,.html,.htm,.png,.jpg,.jpeg,.gif,.webp,text/plain,text/markdown,text/csv,application/json,text/x-python,image/png,image/jpeg,image/gif,image/webp" multiple class="hidden">
        </form>
        <div id="selected-model-name" class="selected-model-name" aria-live="polite"></div>
        <div id="pending-uploads" class="pending-uploads hidden"></div>
        <div class="actions">
            <div class="actions-left">
                <button id="attach-image" title="Attach images" type="button" class="hidden"></button>
                <button id="attach-file" title="Attach files" type="button"></button>

                <div class="model-picker">
                    <div class="model-picker-display" aria-hidden="true"></div>
                    {# model_names is a list of model names. Present them as a select dropdown #}
                    <select aria-label="Select Model" id="select-model">
                        {% for model_name in model_names %}
                        {% if model_name == default_model %}
                        <option value="{{ model_name }}" selected>{{ model_name }}</option>
                        {% else %}
                        <option value="{{ model_name }}">{{ model_name }}</option>
                        {% endif %}
                        {% endfor %}
                    </select>
                </div>
                
            </div>
            <div class="actions-right">
                <button id="send" title="Send message" type="button" disabled></button>
                <button id="abort" title="Abort streaming" disabled></button>
            </div>
        </div>
    </div>

    <div id="image-preview-modal" class="image-preview-modal hidden" role="dialog" aria-modal="true" aria-label="Image preview">
        <button id="image-preview-modal-close" class="image-preview-modal-close" type="button" aria-label="Close image preview">×</button>
        <img id="image-preview-modal-image" class="image-preview-modal-image" alt="Selected image preview">
    </div>
</main>
{% endblock content %}
